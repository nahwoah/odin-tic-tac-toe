<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script async src="script.js"></script>
</head>

<body>
    <div class="container">
        <div class="row1">
            <button class="btn1" data-position="1">O</button>
            <button class="btn2" data-position="2">X</button>
            <button class="btn3" data-position="3"></button>
        </div>
        <div class="row2">
            <button class="btn4" data-position="4"></button>
            <button class="btn5" data-position="5"></button>
            <button class="btn6" data-position="6"></button>
        </div>
        <div class="row3">
            <button class="btn7" data-position="7"></button>
            <button class="btn8" data-position="8"></button>
            <button class="btn9" data-position="9"></button>
        </div>
    </div>
</body>

</html>
