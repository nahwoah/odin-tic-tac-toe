<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script async src="script.js"></script>
</head>

<body>
    <div class="winner"></div>
    <div class="container">
        <div class="row1">
            <button class="btn" data-position="1"></button>
            <button class="btn" data-position="2"></button>
            <button class="btn" data-position="3"></button>
        </div>
        <div class="row2">
            <button class="btn" data-position="4"></button>
            <button class="btn" data-position="5"></button>
            <button class="btn" data-position="6"></button>
        </div>
        <div class="row3">
            <button class="btn" data-position="7"></button>
            <button class="btn" data-position="8"></button>
            <button class="btn" data-position="9"></button>
        </div>
    </div>
    <div class="p1score"></div>
    <div class="p2score"></div>
    <form>
        <input type="text" name="playerName" id="playerName" placeholder="Enter name for player 1">
        <button id="formSubmit" type="submit">Submit</button>
    </form>
    <button id="reset">Reset</button>
</body>

</html>
